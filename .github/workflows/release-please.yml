on:
  push:
    branches:
      - main

permissions:
  contents: read

name: release-please

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: "markdown-confluence/publish"

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      CurrentVersion: ${{ steps.releaseassets.outputs.CurrentVersion }}
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      packages: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit # TODO: change to 'egress-policy: block' after couple of runs

      - name: Checkout repository
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 # v4.1.0

      - id: release-please
        uses: google-github-actions/release-please-action@ca6063f4ed81b55db15b8c42d1b6f7925866342d # v3.7.11
        with:
          command: manifest
          token: ${{ secrets.RELEASE_PLEASE_PAT }}
      
      - name: Set up Vite+
        if: ${{ steps.release-please.outputs.release_created }}
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24.15.0"
          cache: true
          run-install: false

      - name: Checkout source repository
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 # v4.1.0
        with:
          repository: markdown-confluence/obsidian-integration
          token: ${{ secrets.RELEASE_PLEASE_PAT }}
          path: ./.release-repo

      - name: Upload release assets
        id: releaseassets
        if: ${{ steps.release-please.outputs.release_created }}
        run: ./.build/upload-release-assets.sh ${{ steps.release-please.outputs.tag_name }} ${{ steps.release-please.outputs.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_PAT }}

      - name: Publish packages
        if: ${{ steps.release-please.outputs.release_created }}
        run: |
          vp pm publish --filter @markdown-confluence/lib --access public --no-git-checks
          vp pm publish --filter @markdown-confluence/mermaid-electron-renderer --access public --no-git-checks
          vp pm publish --filter @markdown-confluence/mermaid-puppeteer-renderer --access public --no-git-checks
          vp pm publish --filter @markdown-confluence/cli --access public --no-git-checks

      - name: Log in to the Container registry
        if: ${{ steps.release-please.outputs.release_created }}
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.RELEASE_PLEASE_PAT }}

      - name: Extract metadata (tags, labels) for Docker
        if: ${{ steps.release-please.outputs.release_created }}
        id: meta
        uses: docker/metadata-action@9dc751fe249ad99385a2583ee0d084c400eee04e
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.release-please.outputs.major }}
            type=raw,value=${{ steps.release-please.outputs.major }}.${{ steps.release-please.outputs.minor }}
            type=raw,pattern={{version}},value=v${{ steps.releaseassets.outputs.CurrentVersion }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        if: ${{ steps.release-please.outputs.release_created }}
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: packages/cli
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
