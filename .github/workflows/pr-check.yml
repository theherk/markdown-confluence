name: Pull Request Verification

on:
  pull_request:
    branches:
      - main

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    outputs:
      eslint_status: ${{ steps.eslint.outcome }}
      prettier_status: ${{ steps.prettier.outcome }}
      tests_status: ${{ steps.tests.outcome }}
      build_status: ${{ steps.build.outcome }}
      builddocker_status: ${{ steps.builddocker.outcome }}

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@8ca2b8b2ece13480cda6dacd3511b49857a23c09 # v2.5.1
      with:
        egress-policy: audit # TODO: change to 'egress-policy: block' after couple of runs

    - name: Check out repository code
      uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 # v4.1.0

    - name: Set up Vite+
      uses: voidzero-dev/setup-vp@v1
      with:
        node-version: "24.15.0"
        cache: true
        run-install: false

    - name: Install dependencies
      run: vp install --frozen-lockfile

    - name: Run Vite+ check
      id: eslint
      continue-on-error: true
      run: vp run check

    - name: Run Vite+ format check
      id: prettier
      continue-on-error: true
      run: vp run fmt:check

    - name: Run Tests
      id: tests
      continue-on-error: true
      run: vp test run
      env:
        CONFLUENCE_BASE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
        ATLASSIAN_USERNAME: ${{ secrets.ATLASSIAN_USERNAME }}
        ATLASSIAN_API_TOKEN: ${{ secrets.ATLASSIAN_API_TOKEN }}
        CONFLUENCE_PARENT_ID: "IGNORE ME"

    - name: Run Vite+ build
      id: build
      continue-on-error: true
      run: vp run build

    - name: Run docker build
      id: builddocker
      continue-on-error: true
      run: vp run -r build:docker

    - name: Report Errors
      if: ${{ always() }}
      run: |
        echo "ESLint status: ${{ steps.eslint.outcome }}"
        echo "Prettier status: ${{ steps.prettier.outcome }}"
        echo "Tests status: ${{ steps.tests.outcome }}"
        echo "Build status: ${{ steps.build.outcome }}"
        echo "Build Docker status: ${{ steps.builddocker.outcome }}"
        if [[ ${{ steps.eslint.outcome }} == 'failure' ]] \
        || [[ ${{ steps.prettier.outcome }} == 'failure' ]] \
        || [[ ${{ steps.tests.outcome }} == 'failure' ]] \
        || [[ ${{ steps.build.outcome }} == 'failure' ]] \
        || [[ ${{ steps.builddocker.outcome }} == 'failure' ]] \
        ; then
          exit 1
        fi

  test-windows:
    runs-on: windows-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 # v4.1.0

    - name: Set up Vite+
      uses: voidzero-dev/setup-vp@v1
      with:
        node-version: "24.15.0"
        cache: true
        run-install: false

    - name: Install dependencies
      run: vp install --frozen-lockfile

    - name: Run Tests
      run: vp test run
      env:
        CONFLUENCE_BASE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
        ATLASSIAN_USERNAME: ${{ secrets.ATLASSIAN_USERNAME }}
        ATLASSIAN_API_TOKEN: ${{ secrets.ATLASSIAN_API_TOKEN }}
        CONFLUENCE_PARENT_ID: "IGNORE ME"
